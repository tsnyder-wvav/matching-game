<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Matching Game</title>

<style>
body {
  user-select: none;
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #0b1020;
  color: white;
  overflow: hidden;
}

/* ================= HUD ================= */
#hud {
  display: flex;
  justify-content: space-between;
  padding: 12px 18px;
  background: rgba(0,0,0,0.85);
  border-bottom: 2px solid rgb(22, 54, 219);
  backdrop-filter: blur(10px);
}

#timerBox {
  padding: 8px 14px;
  border-radius: 10px;
  border: 1px solid rgba(22, 54, 219, 0.5);
  background: rgba(22, 54, 219, 0.1);
  font-weight: bold;
}

/* ================= SCOREBOARD ================= */
#hudRight {
  display: flex;
  gap: 10px;
}

.teamScore {
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 16px;
  border: 1px solid rgba(22, 54, 219, 0.3);
  background: rgba(255,255,255,0.05);
}

.teamScore.active {
  border: 2px solid #d61e1e;
  box-shadow: 0 0 12px rgba(214,30,30,0.8);
  transform: scale(1.08);
}

/* ================= BOARD ================= */
#gameBoard {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  padding: 15px;
  max-width: 1280px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(22,54,219,0.4);
  border-radius: 12px;
  padding: 10px;
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 14px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  box-shadow: 0 0 10px rgb(22,54,219);
  transform: scale(1.03);
}

.card.selected {
  background: rgb(22,54,219);
}

.card img {
  max-width: 100%;
  max-height: 80px;
  object-fit: contain;
  pointer-events: none;
}

/* ================= OVERLAY ================= */
#overlay {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  z-index: 999;
  background: rgba(0,0,0,0.97);
}

#overlayText {
  font-size: 30px;
  margin-bottom: 20px;
  line-height: 1.4;
  height: 550px;
}

#startBtn {
  padding: 12px 28px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: rgb(22,54,219);
  color: white;
  font-weight: bold;
  position:absolute;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
}
</style>
</head>

<body>

<div id="hud">
  <div id="timerBox">TIME <span id="timer">60.00</span></div>
  <div id="hudRight"></div>
</div>

<div id="gameBoard"></div>

<div id="overlay">
  <div>
    <div id="overlayText"></div>
    <button id="startBtn"></button>
  </div>
</div>

<script>
const cards = [
  { id: 1, term: "Ford F-Series Pickup", img: "1.jpg", bonus: 1 },
  { id: 2, term: "Chevrolet Silverado Pickup", img: "2.jpg", bonus: 1 },
  { id: 3, term: "Toyota RAV4", img: "3.jpg", bonus: 1 },
  { id: 4, term: "Honda CR-V", img: "4.jpg", bonus: 1 },
  { id: 5, term: "Ram Pickup", img: "5.jpg", bonus: 1 },
  { id: 6, term: "GMC Sierra", img: "6.jpg", bonus: 1 },
  { id: 7, term: "Chevrolet Equinox", img: "7.jpg", bonus: 1 },
  { id: 8, term: "Tesla Model Y", img: "8.jpg", bonus: 1 },
  { id: 9, term: "Toyota Camry", img: "9.jpg", bonus: 1 },
  { id: 10, term: "Toyota Tacoma", img: "10.jpg", bonus: 1 },
  { id: 11, term: "Toyota Corolla", img: "11.jpg", bonus: 1 },
  { id: 12, term: "Honda Civic", img: "12.jpg", bonus: 1 },
  { id: 13, term: "Hyundai Tucson", img: "13.jpg", bonus: 1 },
  { id: 14, term: "Ford Explorer", img: "14.jpg", bonus: 1 }
];

const board = document.getElementById("gameBoard");
const overlay = document.getElementById("overlay");
const overlayText = document.getElementById("overlayText");
const startBtn = document.getElementById("startBtn");

let teamCount = 5;
let scores = [];
let currentTeam = 0;

let timeLeft = 60 * 100;
let timerInterval;

let selectedCards = [];
let activePairs = [...cards];
let lastGuess = [];

const MAX_PAIRS = 14;

// ================= INIT =================
fillBoard();
renderBoard();
showRules();

// ================= BOARD =================
function fillBoard(){
  activePairs = cards.slice();
  while(activePairs.length > MAX_PAIRS){
    activePairs.splice(Math.floor(Math.random()*activePairs.length),1);
  }
}

function renderBoard(){
  board.innerHTML="";
  let deck=[];

  activePairs.forEach(c=>{
    deck.push({content:c.term,id:c.id,type:"term"});
    deck.push({content:c.img,id:c.id,type:"image"});
  });

  deck.sort(()=>Math.random()-0.5);

  deck.forEach(item=>{
    let div=document.createElement("div");
    div.className="card";

    div.dataset.id=item.id;
    div.dataset.type=item.type;

    if(item.type==="image"){
      div.innerHTML=`<img src="${item.content}">`;
    } else {
      div.textContent=item.content;
    }

    div.onclick=()=>handle(div);
    board.appendChild(div);
  });

  updateScores();
}

// ================= CLICK =================
function handle(card){
  if(overlay.style.display==="flex")return;

  if(card.classList.contains("selected")){
    card.classList.remove("selected");
    selectedCards = selectedCards.filter(c=>c!==card);
    return;
  }

  if(selectedCards.length>=2)return;

  card.classList.add("selected");
  selectedCards.push(card);

  if(selectedCards.length===2)check();
}

// ================= CHECK =================
function check(){
  clearInterval(timerInterval);

  const [a,b]=selectedCards;

  lastGuess=[
    a.dataset.type==="image"?"[IMAGE]":a.textContent,
    b.dataset.type==="image"?"[IMAGE]":b.textContent
  ];

  let match=a.dataset.id===b.dataset.id && a.dataset.type!==b.dataset.type;

  let msg="INCORRECT";

  if(match){
    let cardData=cards.find(c=>c.id==a.dataset.id);
    let basePoints=Math.max(1,Math.floor(timeLeft/100));
    let finalPoints=basePoints*(cardData.bonus||1);

    scores[currentTeam]+=finalPoints;
    msg=`CORRECT +${finalPoints}`;

    activePairs=activePairs.filter(p=>p.id!=cardData.id);
  }

  selectedCards=[];
  renderBoard();
  next(msg);
}

// ================= NEXT =================
function next(msg){
  overlay.style.display="flex";

  overlayText.innerHTML=`
    ${msg}
    <br><br>
    ${lastGuess.join("<br>")}
    <br><br>
    Team ${((currentTeam+1)%teamCount)+1} is next
  `;

  startBtn.textContent="START TURN";
  startBtn.onclick=startTurn;

  currentTeam=(currentTeam+1)%teamCount;
  updateScores();
}

// ================= SCORES =================
function updateScores(){
  let hud=document.getElementById("hudRight");
  hud.innerHTML="";

  scores.forEach((s,i)=>{
    let div=document.createElement("div");
    div.className="teamScore";
    if(i===currentTeam)div.classList.add("active");
    div.textContent=`TEAM ${i+1}: ${s}`;
    hud.appendChild(div);
  });
}

// ================= RULES =================
function showRules(){
  overlay.style.display="flex";
  overlayText.innerHTML=`
    <h1>VEHICLE MATCH</h1>
    Match the vehicle name to the image<br><br>
  `;
  startBtn.textContent="START GAME";
  startBtn.onclick=startGame;
}

function startGame(){
  scores=Array(teamCount).fill(0);
  overlay.style.display="none";
  updateScores();
  startTurn();
}

// ================= TIMER =================
function startTurn(){
  overlay.style.display="none";
  clearInterval(timerInterval);

  timerInterval=setInterval(()=>{
    timeLeft--;
    let s=Math.floor(timeLeft/100);
    let cs=timeLeft%100;
    document.getElementById("timer").textContent=`${s}.${cs}`;

    if(timeLeft<=0){
      clearInterval(timerInterval);
      next("TIME'S UP");
    }
  },10);
}
</script>
</body>
</html>
