<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Geometry Match</title>

<style>
body {
  user-select: none;
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #0b1020;
  color: white;
  overflow: hidden;
}

/* HUD */
#hud {
  display: flex;
  justify-content: space-between;
  padding: 12px 18px;
  background: rgba(0,0,0,0.85);
  border-bottom: 2px solid rgb(22, 54, 219);
}

#timerBox {
  padding: 8px 14px;
  border-radius: 10px;
  background: rgba(22,54,219,0.1);
  border: 1px solid rgba(22,54,219,0.5);
  font-weight: bold;
}

#hudRight {
  display: flex;
  gap: 10px;
}

.teamScore {
  padding: 6px 10px;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(22,54,219,0.3);
}

.teamScore.active {
  border: 2px solid #d61e1e;
}

/* BOARD */
#gameBoard {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  padding: 15px;
}

.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(22,54,219,0.4);
  border-radius: 12px;
  padding: 10px;
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  cursor: pointer;
}

.card.selected {
  background: rgb(22,54,219);
}

/* OVERLAY */
#overlay {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.97);
  z-index: 999;
  text-align: center;
}

#overlayText {
  font-size: 20px;
  margin-bottom: 20px;
  min-height: 200px;
}

#startBtn {
  padding: 12px 28px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: rgb(22,54,219);
  color: white;
  cursor: pointer;
  position: absolute;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
}
</style>
</head>

<body>

<div id="hud">
  <div id="timerBox">TIME <span id="timer">60.00</span></div>
  <div id="hudRight"></div>
</div>

<div id="gameBoard"></div>

<div id="overlay">
  <div>
    <div id="overlayText"></div>
    <button id="startBtn"></button>
  </div>
</div>

<script>

let cards = [];
let activePairs = [];
let remainingPool = [];

let board = document.getElementById("gameBoard");
let overlay = document.getElementById("overlay");
let overlayText = document.getElementById("overlayText");
let startBtn = document.getElementById("startBtn");

let teamCount = 5;
let scores = [];
let currentTeam = 0;

let selectedCards = [];

const MAX_PAIRS = 14;

// ================= SHEET IMPORT =================
function convertSheetUrl(url){
  let match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
  if(!match) return null;

  let id = match[1];
  let gidMatch = url.match(/gid=(\d+)/);
  let gid = gidMatch ? gidMatch[1] : "0";

  return `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
}

async function loadFromSheet(){
  let url = document.getElementById("sheetInput").value.trim();
  let csvUrl = convertSheetUrl(url);

  try {
    let res = await fetch(csvUrl);
    let text = await res.text();

    parseCSV(text);

    if(cards.length === 0){
      throw new Error("No cards found");
    }

    overlayText.innerHTML = `
      <h2 style="color:lime">Sheet Loaded ✔</h2>
      <p>${cards.length} cards loaded</p>
      <div id="teamSelect"></div>
    `;

    showTeamSelection();

  } catch(e){
    overlayText.innerHTML += `<div style="color:red">Failed to load sheet</div>`;
  }
}

// ================= CSV =================
function parseCSV(csv){
  csv = csv.replace(/\r/g,"");

  let rows = csv.trim().split("\n").map(r => r.split(","));

  cards = rows
    .filter(r => r[0] && r[1])
    .map((r,i)=>({
      id:i+1,
      term:r[0],
      def:r[1],
      bonus:Number(r[2])||1
    }));

  remainingPool = [...cards];
}

// ================= TEAM SELECTION =================
function showTeamSelection(){
  let container = document.getElementById("teamSelect");

  for(let i=1;i<=5;i++){
    let btn = document.createElement("button");
    btn.textContent = i + " Teams";

    btn.style.margin = "5px";
    btn.style.padding = "10px";
    btn.style.border = "none";
    btn.style.borderRadius = "8px";
    btn.style.background = "rgb(22,54,219)";
    btn.style.color = "white";
    btn.style.cursor = "pointer";

    btn.onclick = () => {
      teamCount = i;
      startBtn.style.display = "inline-block";
      highlight(container,i);
    };

    container.appendChild(btn);
  }
}

function highlight(container, selected){
  [...container.children].forEach((b,i)=>{
    b.style.outline = (i===selected-1)?"3px solid gold":"none";
  });
}

// ================= START GAME =================
startBtn.textContent = "START GAME";
startBtn.style.display = "none";

startBtn.onclick = () => {
  scores = Array(teamCount).fill(0);
  currentTeam = 0;

  overlay.style.display = "none";

  fillBoard();
  renderBoard();
  updateScores();
};

// ================= BOARD =================
function fillBoard(){
  activePairs = [];
  remainingPool = [...cards];

  while(activePairs.length < Math.min(MAX_PAIRS, cards.length)){
    let i = Math.floor(Math.random()*remainingPool.length);
    activePairs.push(remainingPool.splice(i,1)[0]);
  }
}

function renderBoard(){
  board.innerHTML = "";

  let deck = [];

  activePairs.forEach(c=>{
    deck.push({text:c.term,id:c.id,type:"term"});
    deck.push({text:c.def,id:c.id,type:"def"});
  });

  deck.sort(()=>Math.random()-0.5);

  deck.forEach(item=>{
    let div=document.createElement("div");
    div.className="card";
    div.textContent=item.text;
    div.dataset.id=item.id;
    div.dataset.type=item.type;

    div.onclick=()=>handle(div);
    board.appendChild(div);
  });
}

// ================= GAME LOGIC =================
function handle(card){
  if(selectedCards.length>=2) return;

  card.classList.add("selected");
  selectedCards.push(card);

  if(selectedCards.length===2) check();
}

function check(){
  let [a,b]=selectedCards;

  if(a.dataset.id===b.dataset.id && a.dataset.type!==b.dataset.type){
    scores[currentTeam]+=10;
  }

  selectedCards=[];
  renderBoard();

  currentTeam=(currentTeam+1)%teamCount;
  updateScores();
}

// ================= SCORES =================
function updateScores(){
  let hud=document.getElementById("hudRight");
  hud.innerHTML="";

  scores.forEach((s,i)=>{
    let d=document.createElement("div");
    d.className="teamScore";
    if(i===currentTeam) d.classList.add("active");
    d.textContent=`TEAM ${i+1}: ${s}`;
    hud.appendChild(d);
  });
}

// ================= INIT =================
overlayText.innerHTML = `
<h1>GEOMETRY MATCH</h1>

<p>Paste Google Sheets link:</p>

<input id="sheetInput"
style="width:80%;padding:10px;border-radius:8px;border:none;"
placeholder="Published Google Sheets URL">

<br><br>

<button onclick="loadFromSheet()"
style="padding:10px 20px;border:none;border-radius:8px;background:#1e90ff;color:white;">
Load Questions
</button>

<div style="margin-top:10px;font-size:13px;color:#aaa">
Make sure sheet is published as CSV
</div>
`;

</script>
</body>
</html>
