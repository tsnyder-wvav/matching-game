<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auto Match</title>

<style>
body {
  user-select: none;
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #0b1020;
  color: white;
  overflow: hidden;
}

/* ================= HUD ================= */
#hud {
  display: flex;
  justify-content: space-between;
  padding: 12px 18px;
  background: rgba(0,0,0,0.85);
  border-bottom: 2px solid rgb(22, 54, 219);
  backdrop-filter: blur(10px);
}

#timerBox {
  padding: 8px 14px;
  border-radius: 10px;
  border: 1px solid rgba(22, 54, 219, 0.5);
  background: rgba(22, 54, 219, 0.1);
  font-weight: bold;
}

/* ================= SCOREBOARD ================= */
#hudRight {
  display: flex;
  gap: 10px;
}

.teamScore {
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 16px;
  border: 1px solid rgba(22, 54, 219, 0.3);
  background: rgba(255,255,255,0.05);
}

.teamScore.active {
  border: 2px solid #d61e1e;
  box-shadow: 0 0 12px rgba(214,30,30,0.8);
  transform: scale(1.08);
}

/* ================= BOARD ================= */
#gameBoard {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  padding: 15px;
  max-width: 1280px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(22,54,219,0.4);
  border-radius: 12px;
  padding: 10px;
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  box-shadow: 0 0 10px rgb(22,54,219);
  transform: scale(1.03);
}

.card.selected {
  background: rgb(22,54,219);
}

/* ================= OVERLAY ================= */
#overlay {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  z-index: 999;
  background: rgba(0,0,0,0.97);
}

#overlayText {
  font-size: 30px;
  margin-bottom: 20px;
  line-height: 1.4;
  height: 550px;
}

#startBtn {
  padding: 12px 28px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: rgb(22,54,219);
  color: white;
  font-weight: bold;
  position:absolute;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
}
</style>
</head>

<body>

<div id="hud">
  <div id="timerBox">TIME <span id="timer">30.00</span></div>
  <div id="hudRight"></div>
</div>

<div id="gameBoard"></div>

<div id="overlay">
  <div>
    <div id="overlayText"></div>
    <button id="startBtn"></button>
  </div>
</div>

<script>

const cards = [
  { id: 1, term: "Vehicle", def: "A machine used for transportation", bonus: 1 },
  { id: 2, term: "Engine", def: "The part of a car that produces power", bonus: 1 },
  { id: 3, term: "Transmission", def: "System that transfers power from engine to wheels", bonus: 1 },
  { id: 4, term: "Brake", def: "System used to slow or stop a vehicle", bonus: 1 },
  { id: 5, term: "Tire", def: "Rubber covering around a wheel", bonus: 1 },
  { id: 6, term: "Wheel", def: "Circular part that rotates and supports the tire", bonus: 1 },
  { id: 7, term: "Steering wheel", def: "Device used to control the direction of a car", bonus: 1 },
  { id: 8, term: "Dashboard", def: "Panel that displays vehicle information", bonus: 1 },
  { id: 9, term: "Gas tank", def: "Container that holds fuel for the vehicle", bonus: 1 },
  { id: 10, term: "Fuel", def: "Energy source that powers the engine", bonus: 1 },
  { id: 11, term: "Oil", def: "Lubricant that reduces engine friction", bonus: 1 },
  { id: 12, term: "Battery", def: "Provides electrical power to start the car", bonus: 1 },
  { id: 13, term: "Alternator", def: "Charges the battery while the engine runs", bonus: 1 },
  { id: 14, term: "Radiator", def: "Cools the engine to prevent overheating", bonus: 1 },
  { id: 15, term: "Exhaust", def: "System that removes gases from the engine", bonus: 1 },
  { id: 16, term: "Muffler", def: "Reduces noise from the exhaust system", bonus: 1 },
  { id: 17, term: "Suspension", def: "System that absorbs road shocks", bonus: 1 },
  { id: 18, term: "Shock absorber", def: "Part that smooths out bumps in the road", bonus: 1 },
  { id: 19, term: "Alignment", def: "Adjustment of wheel angles for proper driving", bonus: 1 },
  { id: 20, term: "Speed", def: "How fast a vehicle is moving", bonus: 1 },
  { id: 21, term: "Acceleration", def: "Increase in a vehicle’s speed", bonus: 1 },
  { id: 22, term: "Brake pedal", def: "Pedal used to slow or stop the car", bonus: 1 },
  { id: 23, term: "Gas pedal", def: "Pedal used to increase speed", bonus: 1 },
  { id: 24, term: "Clutch", def: "Device that connects and disconnects engine power (manual cars)", bonus: 1 },
  { id: 25, term: "Gear", def: "Part that controls speed and power ratio", bonus: 1 },
  { id: 26, term: "Parking brake", def: "Brake used to keep a car stationary", bonus: 1 },
  { id: 27, term: "Headlight", def: "Light at the front of a vehicle", bonus: 1 },
  { id: 28, term: "Taillight", def: "Light at the rear of a vehicle", bonus: 1 },
  { id: 29, term: "Turn signal", def: "Light indicating a turn or lane change", bonus: 1 },

  { id: 30, term: "Windshield", def: "Front glass of a vehicle", bonus: 2 },
  { id: 31, term: "Wiper", def: "Device that clears rain from windshield", bonus: 2 },
  { id: 32, term: "Airbag", def: "Safety device that inflates during a crash", bonus: 2 },
  { id: 33, term: "Seatbelt", def: "Safety strap that secures passengers", bonus: 2 },
  { id: 34, term: "Horsepower", def: "Measurement of engine power", bonus: 2 },
  { id: 35, term: "Torque", def: "Rotational force produced by the engine", bonus: 2 },
  { id: 36, term: "Mileage", def: "Distance a vehicle travels per gallon of fuel (MPG)", bonus: 2 },
  { id: 37, term: "Oil change", def: "Maintenance replacing old engine oil", bonus: 2 },

  { id: 38, term: "Tire pressure", def: "Amount of air inside a tire", bonus: 3 },
  { id: 39, term: "Coolant", def: "Fluid that helps regulate engine temperature", bonus: 3 },
  { id: 40, term: "Check engine light", def: "Warning light for engine issues", bonus: 3 },
  { id: 41, term: "Drivetrain", def: "System that delivers power to the wheels", bonus: 3 },
  { id: 42, term: "Differential", def: "Device that allows wheels to rotate at different speeds", bonus: 3 }
];

const board = document.getElementById("gameBoard");
const overlay = document.getElementById("overlay");
const overlayText = document.getElementById("overlayText");
const startBtn = document.getElementById("startBtn");

let teamCount = 5;
let scores = [];

let currentTeam = 0;

let timeLeft = 30 * 100;
let timerInterval;

let selectedCards = [];
let activePairs = [];
let remainingPool = [...cards];

let lastGuess = [];

const MAX_PAIRS = 14;

// ================= INIT =================
fillBoard();
renderBoard();
showRules();

// ================= BOARD =================
function fillBoard(){
  while(activePairs.length < MAX_PAIRS && remainingPool.length){
    let i = Math.floor(Math.random() * remainingPool.length);
    activePairs.push(remainingPool.splice(i,1)[0]);
  }
}

function renderBoard(){
  board.innerHTML="";
  let deck=[];

  activePairs.forEach(c=>{
    deck.push({text:c.term, id:c.id, type:"term"});
    deck.push({text:c.def, id:c.id, type:"def"});
  });

  deck.sort(()=>Math.random()-0.5);

  deck.forEach(item=>{
    let div=document.createElement("div");
    div.className="card";
    div.textContent=item.text;

    div.dataset.id=item.id;
    div.dataset.type=item.type;

    div.onclick=()=>handle(div);
    board.appendChild(div);
  });

  updateScores();
}

// ================= CLICK =================
function handle(card){
  if(overlay.style.display==="flex")return;

  if(card.classList.contains("selected")){
    card.classList.remove("selected");
    selectedCards = selectedCards.filter(c=>c!==card);
    return;
  }

  if(selectedCards.length>=2)return;

  card.classList.add("selected");
  selectedCards.push(card);

  if(selectedCards.length===2)check();
}

// ================= CHECK =================
function check(){
  clearInterval(timerInterval);

  const [a,b] = selectedCards;
  lastGuess = [a.textContent, b.textContent];

  let match =
    a.dataset.id === b.dataset.id &&
    a.dataset.type !== b.dataset.type;

  let msg = "INCORRECT -10";

  if(match){
    const cardData = cards.find(c => c.id == a.dataset.id);

    let basePoints = Math.max(1, Math.floor(timeLeft / 100));
    let bonus = cardData.bonus || 1;
    let finalPoints = basePoints * bonus;

    scores[currentTeam] += finalPoints;

    msg = bonus > 1
      ? `${bonus}x BONUS! CORRECT +${finalPoints}`
      : `CORRECT +${finalPoints}`;

    activePairs = activePairs.filter(p => p.id != cardData.id);

    if (checkGameOver()) return;

    if (remainingPool.length > 0) {
      let i = Math.floor(Math.random() * remainingPool.length);
      activePairs.push(remainingPool.splice(i,1)[0]);
    }

    checkGameOver();
  } else {
    scores[currentTeam] -= 10;
  }

  selectedCards=[];
  renderBoard();
  next(msg);
}

// ================= GAME OVER =================
function checkGameOver(){
  if(activePairs.length === 0 && remainingPool.length === 0){

    overlay.style.display = "flex";
    overlay.style.background = "rgba(0,0,0,0.97)";

    let sorted = scores
      .map((s, i) => ({team: i + 1, score: s}))
      .sort((a, b) => b.score - a.score);

    let leaderboard = `
      <div style="
        margin: 20px auto;
        padding: 15px;
        width: 260px;
        background: rgba(255,255,255,0.08);
        border-radius: 12px;
        text-align: left;
      ">
        <div style="text-align:center; font-weight:bold; margin-bottom:10px; font-size:20px;">
          FINAL LEADERBOARD
        </div>
    `;

    sorted.forEach((t, i) => {
      leaderboard += `
        <div style="
          display:flex;
          justify-content:space-between;
          padding: 5px 0;
          ${i === 0 ? "color:gold;font-weight:bold;" : ""}
        ">
          <span>${i + 1}. Team ${t.team}</span>
          <span>${t.score}</span>
        </div>
      `;
    });

    leaderboard += `</div>`;

    overlayText.innerHTML = `
      <div style="font-size:54px;color:gold;font-weight:bold;">
        GAME OVER
      </div>
      <br>
      ${leaderboard}
    `;

    startBtn.textContent = "GAME OVER";
    startBtn.disabled = true;
    startBtn.style.opacity = "0.5";
    startBtn.style.cursor = "not-allowed";

    clearInterval(timerInterval);
    return true;
  }
  return false;
}

// ================= TIMER =================
function startTurn(){
  overlay.style.display="none";

  timeLeft = 30 * 100;

  clearInterval(timerInterval);

  timerInterval = setInterval(()=>{
    timeLeft--;

    let s = Math.floor(timeLeft/100);
    let cs = timeLeft%100;

    document.getElementById("timer").textContent =
      `${s}.${cs.toString().padStart(2,"0")}`;

    if(timeLeft<=0){
      clearInterval(timerInterval);

      scores[currentTeam] -= 10;

      lastGuess = ["", ""];

      selectedCards.forEach(card => {
        card.classList.remove("selected");
      });

      selectedCards = [];

      updateScores();

      next("TIME'S UP -10");
    }
  },10);
}

// ================= NEXT =================
function next(msg){
  overlay.style.display="flex";

  const nextTeam = (currentTeam + 1) % teamCount;

  const isCorrect = msg.includes("CORRECT") && !msg.includes("INCORRECT -10");
  const isWrong = msg === "INCORRECT -10" || msg === "TIME'S UP -10";

  overlay.style.background =
    isCorrect ? "#2ecc71" :
    isWrong ? "#d61e1e" :
    "rgba(0,0,0,0.97)";

  overlayText.innerHTML = `
    ${msg}
    <br><br>
    <div>
      <b>Guess:</b><br>
      ${lastGuess[0] || ""}<br>
      ${lastGuess[1] || ""}
    </div>
    <br>
    Team ${nextTeam + 1} is up next
  `;

  startBtn.textContent="START TURN";
  startBtn.onclick=startTurn;

  currentTeam = nextTeam;
  updateScores();
}

// ================= SCORES =================
function updateScores(){
  const hud=document.getElementById("hudRight");
  hud.innerHTML="";

  scores.forEach((s,i)=>{
    let div=document.createElement("div");
    div.className="teamScore";
    if(i===currentTeam)div.classList.add("active");
    div.textContent=`TEAM ${i+1}: ${s}`;
    hud.appendChild(div);
  });
}

// ================= RULES + TEAM SELECT =================
function showRules(){
  overlay.style.display="flex";
  overlay.style.background="rgba(0,0,0,0.97)";

  overlayText.innerHTML=`
    <div style="font-size:54px;color:gold;font-weight:bold;">
      AUTOMOTIVE MATCH
    </div>

    <br>

    🎯 1 guess per turn<br>
    ⭐ Bonus cards multiply points<br>
    ❌ Incorrect answers lose 10 points<br>
    ⏰ Running out of time loses 10 points<br>
    🧠 Match terms with definitions<br>

    <br><br>

    <div style="font-size:34px;color:white;font-weight:bold;">
      SELECT NUMBER OF TEAMS
    </div>

    <br>

    <div id="teamSelect" style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;"></div>
  `;

  startBtn.textContent="START GAME";
  startBtn.style.display = "none";
  startBtn.onclick=startGameSetup;

  const container = document.getElementById("teamSelect");

  container.innerHTML = "";

  for(let i=1;i<=5;i++){
    let btn = document.createElement("button");
    btn.textContent = i + " Teams";

    btn.style.padding="10px 14px";
    btn.style.borderRadius="10px";
    btn.style.border="none";
    btn.style.cursor="pointer";
    btn.style.fontWeight="bold";
    btn.style.background="rgb(22,54,219)";
    btn.style.color="white";

    btn.onclick = () => {
      teamCount = i;
      highlightSelection(container, i);
      startBtn.style.display = "inline-block";
    };

    container.appendChild(btn);
  }
}

function highlightSelection(container, selected){
  [...container.children].forEach((btn, i)=>{
    btn.style.outline = (i === selected - 1)
      ? "3px solid gold"
      : "none";
  });
}

// ================= START GAME =================
function startGameSetup(){
  scores = Array(teamCount).fill(0);
  currentTeam = 0;

  overlay.style.display="none";
  updateScores();
  startTurn();
}
</script>
</body>
</html>
